<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>
  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>
    </section>
    <form id="checkout-form">
      <fieldset>
        <legend>Shipping & Billing</legend>
        <label>First Name
          <input type="text" name="firstName" required>
        </label>
        <label>Last Name
          <input type="text" name="lastName" required>
        </label>
        <label>Street
          <input type="text" name="street" required>
        </label>
        <label>City
          <input type="text" name="city" required>
        </label>
        <label>State
          <input type="text" name="state" required>
        </label>
        <label>Zip Code
          <input type="text" id="zip" name="zip" required>
        </label>
      </fieldset>
      <fieldset>
        <legend>Payment</legend>
        <label>Card Number
          <input type="text" name="cardNumber" required>
        </label>
        <label>Expiration
          <input type="text" name="expiration" required>
        </label>
        <label>Security Code
          <input type="text" name="code" required>
        </label>
      </fieldset>
      <button type="submit" id="checkout-btn">Checkout</button>
    </form>
    <section id="order-summary">
      <h2>Order Summary</h2>
      <ul>
        <li>Items: <span id="numItems">0</span></li>
        <li>Subtotal: <span id="subtotal">$0.00</span></li>
        <li>Shipping Estimate: <span id="shipping">$0.00</span></li>
        <li>Tax: <span id="tax">$0.00</span></li>
        <li><strong>Order Total: <span id="total">$0.00</span></strong></li>
      </ul>
    </section>

    <footer id="main-footer"></footer>
  </main>

</body>

</html>
